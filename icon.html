<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>退休计算器 - 图标生成</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 40px; font-family: sans-serif; }
  canvas { border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,.12); }
  p { color: #64748B; font-size: 14px; }
</style>
</head>
<body>
<h2>右键 Canvas → 存储图像为... → 保存为 icon.png</h2>
<canvas id="c" width="288" height="288"></canvas>
<p>288×288（上传后微信会自动压缩为 144×144）</p>
<script>
const c = document.getElementById('c')
const ctx = c.getContext('2d')
const s = 288

// Background gradient
const grad = ctx.createLinearGradient(0, 0, s, s)
grad.addColorStop(0, '#3B82F6')
grad.addColorStop(1, '#06B6D4')
ctx.fillStyle = grad
ctx.beginPath()
ctx.roundRect(0, 0, s, s, 48)
ctx.fill()

// Icon: simple calculator/calendar abstraction
ctx.fillStyle = 'rgba(255,255,255,0.25)'
ctx.font = '120px sans-serif'
ctx.textAlign = 'center'
ctx.textBaseline = 'middle'
ctx.fillText('🧮', s/2, s/2)

// Bottom text
ctx.fillStyle = '#fff'
ctx.font = 'bold 36px "PingFang SC","Microsoft YaHei",sans-serif'
ctx.fillText('退休', s/2, 205)
ctx.font = 'bold 28px "PingFang SC","Microsoft YaHei",sans-serif'
ctx.fillText('计算器', s/2, 243)
</script>
</body>
</html>
